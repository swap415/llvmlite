<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>llvmlite wasm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', Menlo, monospace; font-size: 13px; color: #111; padding: 48px 24px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 13px; font-weight: 400; color: #999; margin-bottom: 24px; }
  textarea { width: 100%; min-height: 200px; border: 1px solid #ddd; border-radius: 4px; padding: 12px; font: inherit; font-size: 12px; line-height: 1.6; outline: none; resize: vertical; }
  textarea:focus { border-color: #999; }
  .bar { display: flex; gap: 8px; align-items: center; margin: 10px 0; }
  button { border: 1px solid #ccc; border-radius: 4px; padding: 5px 14px; font: inherit; font-size: 12px; cursor: pointer; background: #fff; }
  button:hover { border-color: #999; }
  button:disabled { opacity: .4; }
  .ex { color: #999; font-size: 11px; cursor: pointer; }
  .ex:hover { color: #111; }
  #out { margin-top: 16px; white-space: pre-wrap; font-size: 12px; line-height: 1.6; min-height: 40px; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
  .dim { color: #999; }
</style>
</head>
<body>

<h1>llvmlite &mdash; LLVM IR &rarr; WebAssembly &rarr; browser</h1>

<textarea id="ir" spellcheck="false">target triple = "wasm32-unknown-unknown"
target datalayout = "e-m:e-p:32:32-i64:64-n32:64-S128"

define i32 @add(i32 %a, i32 %b) #0 {
  %r = add i32 %a, %b
  ret i32 %r
}

attributes #0 = { "wasm-export-name"="add" }</textarea>

<div class="bar">
  <button id="btn" onclick="go()">compile & run</button>
  <span class="ex" onclick="load('add')">add</span>
  <span class="ex" onclick="load('factorial')">factorial</span>
  <span class="ex" onclick="load('memory')">memory</span>
  <span class="ex" onclick="load('simd')">simd</span>
</div>

<div id="out"></div>

<script>
const examples = {
  add: {
    ir: `target triple = "wasm32-unknown-unknown"
target datalayout = "e-m:e-p:32:32-i64:64-n32:64-S128"

define i32 @add(i32 %a, i32 %b) #0 {
  %r = add i32 %a, %b
  ret i32 %r
}

attributes #0 = { "wasm-export-name"="add" }`,
    func: 'add', args: [7, 8],
  },
  factorial: {
    ir: `target triple = "wasm32-unknown-unknown"
target datalayout = "e-m:e-p:32:32-i64:64-n32:64-S128"

define i32 @factorial(i32 %n) #0 {
entry:
  %cmp = icmp sle i32 %n, 1
  br i1 %cmp, label %base, label %recurse
base:
  ret i32 1
recurse:
  %n1 = sub i32 %n, 1
  %r = call i32 @factorial(i32 %n1)
  %result = mul i32 %n, %r
  ret i32 %result
}

attributes #0 = { "wasm-export-name"="factorial" }`,
    func: 'factorial', args: [10],
  },
  memory: {
    ir: `target triple = "wasm32-unknown-unknown"
target datalayout = "e-m:e-p:32:32-i64:64-n32:64-S128"

@buf = global [4 x i32] [i32 10, i32 20, i32 30, i32 40]

define i32 @sum_buf() #0 {
  %p0 = getelementptr [4 x i32], ptr @buf, i32 0, i32 0
  %v0 = load i32, ptr %p0
  %p1 = getelementptr [4 x i32], ptr @buf, i32 0, i32 1
  %v1 = load i32, ptr %p1
  %p2 = getelementptr [4 x i32], ptr @buf, i32 0, i32 2
  %v2 = load i32, ptr %p2
  %p3 = getelementptr [4 x i32], ptr @buf, i32 0, i32 3
  %v3 = load i32, ptr %p3
  %s01 = add i32 %v0, %v1
  %s012 = add i32 %s01, %v2
  %r = add i32 %s012, %v3
  ret i32 %r
}

attributes #0 = { "wasm-export-name"="sum_buf" }`,
    func: 'sum_buf', args: [],
  },
  simd: {
    ir: `target triple = "wasm32-unknown-unknown"
target datalayout = "e-m:e-p:32:32-i64:64-n32:64-S128"

define i32 @dot4(i32 %a0, i32 %a1, i32 %a2, i32 %a3,
                 i32 %b0, i32 %b1, i32 %b2, i32 %b3) #0 {
  %va0 = insertelement <4 x i32> undef, i32 %a0, i32 0
  %va1 = insertelement <4 x i32> %va0, i32 %a1, i32 1
  %va2 = insertelement <4 x i32> %va1, i32 %a2, i32 2
  %va  = insertelement <4 x i32> %va2, i32 %a3, i32 3
  %vb0 = insertelement <4 x i32> undef, i32 %b0, i32 0
  %vb1 = insertelement <4 x i32> %vb0, i32 %b1, i32 1
  %vb2 = insertelement <4 x i32> %vb1, i32 %b2, i32 2
  %vb  = insertelement <4 x i32> %vb2, i32 %b3, i32 3
  %prod = mul <4 x i32> %va, %vb
  %e0 = extractelement <4 x i32> %prod, i32 0
  %e1 = extractelement <4 x i32> %prod, i32 1
  %e2 = extractelement <4 x i32> %prod, i32 2
  %e3 = extractelement <4 x i32> %prod, i32 3
  %s01 = add i32 %e0, %e1
  %s012 = add i32 %s01, %e2
  %r = add i32 %s012, %e3
  ret i32 %r
}

attributes #0 = { "wasm-export-name"="dot4" "target-features"="+simd128" }`,
    func: 'dot4', args: [1,2,3,4,5,6,7,8],
  },
};

function load(name) {
  const ex = examples[name];
  document.getElementById('ir').value = ex.ir;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function go() {
  const btn = document.getElementById('btn');
  const out = document.getElementById('out');
  const ir = document.getElementById('ir').value;

  btn.disabled = true;
  out.innerHTML = '<span class="dim">compiling...</span>';

  // find which example matches (for func/args)
  let func = '', args = [];
  for (const ex of Object.values(examples)) {
    if (ir.includes(`@${ex.func}(`)) { func = ex.func; args = ex.args; break; }
  }

  try {
    const resp = await fetch('/api/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ir }),
    });
    const d = await resp.json();
    if (!d.ok) { out.innerHTML = `<span class="err">${esc(d.error)}</span>`; return; }

    let log = '';
    const ln = s => { log += s + '\n'; };

    // load wasm in browser
    const bytes = Uint8Array.from(atob(d.wasm), c => c.charCodeAt(0));
    ln(`<span class="dim">compiled ${d.size} bytes of wasm</span>`);

    const valid = WebAssembly.validate(bytes);
    ln(`<span class="dim">WebAssembly.validate: </span><span class="${valid ? 'ok' : 'err'}">${valid}</span>`);
    if (!valid) { out.innerHTML = log; return; }

    const { instance } = await WebAssembly.instantiate(bytes);
    const exports = Object.keys(instance.exports).filter(k => typeof instance.exports[k] === 'function' && !k.startsWith('__'));
    ln(`<span class="dim">exports: ${exports.join(', ')}</span>`);

    if (func && instance.exports[func]) {
      const result = instance.exports[func](...args);
      ln(`\n<span class="ok">${func}(${args.join(', ')}) = ${result}</span>`);
    }

    out.innerHTML = log;
  } catch (e) {
    out.innerHTML = `<span class="err">${esc(e.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('ir').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); go(); }
});
</script>
</body>
</html>
