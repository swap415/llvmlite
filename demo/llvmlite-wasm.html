  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; color: #111; padding: 48px 24px; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 14px; font-weight: 500; color: #999; margin-bottom: 32px; }

  .call { margin: 8px 0; font-size: 13px; }
  .call .fn { color: #0066cc; }
  .call .arrow { color: #999; }
  .call .expect { color: #666; }
  button { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 5px 14px; font-family: inherit; font-size: 12px; cursor: pointer; color: #333; }
  button:hover { border-color: #999; }
  button:active { background: #f0f0f0; }
  .output { margin-top: 8px; min-height: 20px; font-size: 12px; color: #333; white-space: pre-wrap; }
  .output .ok { color: #16a34a; }
  .output .err { color: #dc2626; }
  .output .dim { color: #999; }
  hr { border: none; border-top: 1px solid #eee; margin: 32px 0; }
</style>

  },
  {
    name: 'memory (load/store)',
    ir: `@buf = global [4 x i32] [i32 10, i32 20, i32 30, i32 40]

define i32 @sum_buf() {
  %p0 = getelementptr [4 x i32], ptr @buf, i32 0, i32 0
  %v0 = load i32, ptr %p0
  %p1 = getelementptr [4 x i32], ptr @buf, i32 0, i32 1
  %v1 = load i32, ptr %p1
  %p2 = getelementptr [4 x i32], ptr @buf, i32 0, i32 2

}`,
    wasm: 'AGFzbQEAAAABCAJgAABgAAF/AwMCAAEFAwEAAgZMDH8BQZCIBAt/AEGACAt/AEGACAt/AEGQCAt/AEGQCAt/AEGQiAQLfwBBgAgLfwBBkIgEC38AQYCACAt/AEEAC38AQQELfwBBgIAECwfJAQ4GbWVtb3J5AgARX193YXNtX2NhbGxfY3RvcnMAAAdzdW1fYnVmAAEDYnVmAwEMX19kc29faGFuZGxlAwIKX19kYXRhX2VuZAMDC19fc3RhY2tfbG93AwQMX19zdGFja19oaWdoAwUNX19nbG9iYWxfYmFzZQMGC19faGVhcF9iYXNlAwcKX19oZWFwX2VuZAMIDV9fbWVtb3J5X2Jhc2UDCQxfX3RhYmxlX2Jhc2UDChVfX3dhc21fZmlyc3RfcGFnZV9lbmQDCwo3AgIACzIAQQAoAoCIgIAAQYCIgIAAQQRqKAIAakGAiICAAEEIaigCAGpBgIiAgABBDGooAgBqCwsXAQBBgAgLEAoAAAAUAAAAHgAAACgAAAAAUARuYW1lAAwLb3V0cHV0Lndhc20BHQIAEV9fd2FzbV9jYWxsX2N0b3JzAQdzdW1fYnVmBxIBAA9fX3N0YWNrX3BvaW50ZXIJCAEABS5kYXRhAJQBD3RhcmdldF9mZWF0dXJlcwgrC2J1bGstbWVtb3J5Kw9idWxrLW1lbW9yeS1vcHQrFmNhbGwtaW5kaXJlY3Qtb3ZlcmxvbmcrCm11bHRpdmFsdWUrD211dGFibGUtZ2xvYmFscysTbm9udHJhcHBpbmctZnB0b2ludCsPcmVmZXJlbmNlLXR5cGVzKwhzaWduLWV4dA==',
    func: 'sum_buf', args: [], expected: 100,

  {
    name: 'simd (v128)',
    ir: `define i32 @dot4(i32 %a0, i32 %a1, i32 %a2, i32 %a3,
                 i32 %b0, i32 %b1, i32 %b2, i32 %b3) {
  %va0 = insertelement <4 x i32> undef, i32 %a0, i32 0
  %va1 = insertelement <4 x i32> %va0, i32 %a1, i32 1
  %va2 = insertelement <4 x i32> %va1, i32 %a2, i32 2
  %va  = insertelement <4 x i32> %va2, i32 %a3, i32 3
  %vb0 = insertelement <4 x i32> undef, i32 %b0, i32 0
  %vb1 = insertelement <4 x i32> %vb0, i32 %b1, i32 1
  %vb2 = insertelement <4 x i32> %vb1, i32 %b2, i32 2
  %vb  = insertelement <4 x i32> %vb2, i32 %b3, i32 3
  %prod = mul <4 x i32> %va, %vb
  %e0 = extractelement <4 x i32> %prod, i32 0
  %e1 = extractelement <4 x i32> %prod, i32 1
  %e2 = extractelement <4 x i32> %prod, i32 2
  %e3 = extractelement <4 x i32> %prod, i32 3
  %s01 = add i32 %e0, %e1
  %s012 = add i32 %s01, %e2
  %r = add i32 %s012, %e3
  ret i32 %r
}`,
    wasm: 'AGFzbQEAAAABEAJgAABgCH9/f39/f39/AX8DAwIAAQUDAQACBkYLfwFBgIgEC38AQYAIC38AQYAIC38AQYAIC38AQYCIBAt/AEGACAt/AEGAiAQLfwBBgIAIC38AQQALfwBBAQt/AEGAgAQLB8ABDQZtZW1vcnkCABFfX3dhc21fY2FsbF9jdG9ycwAABGRvdDQAAQxfX2Rzb19oYW5kbGUDAQpfX2RhdGFfZW5kAwILX19zdGFja19sb3cDAwxfX3N0YWNrX2hpZ2gDBA1fX2dsb2JhbF9iYXNlAwULX19oZWFwX2Jhc2UDBgpfX2hlYXBfZW5kAwcNX19tZW1vcnlfYmFzZQMIDF9fdGFibGVfYmFzZQMJFV9fd2FzbV9maXJzdF9wYWdlX2VuZAMKCkkCAgALRAEBeyAA/REgAf0cASAC/RwCIAP9HAMgBP0RIAX9HAEgBv0cAiAH/RwD/bUBIgj9GwAgCP0bAWogCP0bAmogCP0bA2oLAEMEbmFtZQAMC291dHB1dC53YXNtARoCABFfX3dhc21fY2FsbF9jdG9ycwEEZG90NAcSAQAPX19zdGFja19wb2ludGVyAJ0BD3RhcmdldF9mZWF0dXJlcwkrC2J1bGstbWVtb3J5Kw9idWxrLW1lbW9yeS1vcHQrFmNhbGwtaW5kaXJlY3Qtb3ZlcmxvbmcrCm11bHRpdmFsdWUrD211dGFibGUtZ2xvYmFscysTbm9udHJhcHBpbmctZnB0b2ludCsPcmVmZXJlbmNlLXR5cGVzKwhzaWduLWV4dCsHc2ltZDEyOA==',
    func: 'dot4', args: [1,2,3,4,5,6,7,8], expected: 70,
  },
];

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const root = document.getElementById('examples');
E.forEach((ex, i) => {
  const div = document.createElement('div');
  div.className = 'example';
  const argStr = ex.args.join(', ');
  div.innerHTML = `
    ${i > 0 ? '<hr>' : ''}
    <div class="label">${esc(ex.name)}</div>
    <pre>${esc(ex.ir)}</pre>
    <div class="call"><span class="fn">${esc(ex.func)}(${esc(argStr)})</span> <span class="arrow">&rarr;</span> <span class="expect">expected ${ex.expected}</span></div>
    <button onclick="run(${i})">run</button>
    <div class="output" id="out-${i}"></div>
  `;
  root.appendChild(div);
});

async function run(i) {
  const ex = E[i];
  const el = document.getElementById(`out-${i}`);
  el.textContent = '';
  const log = s => { el.innerHTML += s + '\n'; };

  const bytes = Uint8Array.from(atob(ex.wasm), c => c.charCodeAt(0));
  const magic = Array.from(bytes.slice(0,4)).map(b => b.toString(16).padStart(2,'0')).join(' ');
  log(`<span class="dim">${bytes.length} bytes  magic: ${magic}</span>`);

  const valid = WebAssembly.validate(bytes);
  if (!valid) { log('<span class="err">invalid wasm</span>'); return; }
  log(`<span class="dim">valid: ${valid}</span>`);

  const { instance } = await WebAssembly.instantiate(bytes);
  const fn = instance.exports[ex.func];
  if (!fn) { log(`<span class="err">export "${ex.func}" not found</span>`); return; }

  const t0 = performance.now();
  const result = fn(...ex.args);
  const ms = (performance.now() - t0).toFixed(4);

  const pass = (typeof ex.expected === 'number' && Math.abs(result - ex.expected) < 0.001);
  log(`<span class="${pass ? 'ok' : 'err'}">${ex.func}(${ex.args.join(', ')}) = ${result}</span>  <span class="dim">${ms} ms</span>`);
}
</script>
